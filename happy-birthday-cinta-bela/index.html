<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <title>Happy Birthday Cinta Bela</title>

  <meta name="description" content="Website virtual gift song pixel art">

  <meta name="theme-color" content="#000000">

  <link rel="preload" href="assets/background.jpg" as="image">
  <link rel="preload" href="assets/character.png" as="image">
  <link rel="preload" href="assets/character_hover.png" as="image">

  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="rotate-warning">

    <div class="rotate-content">

        <div class="phone-icon">
            📱
        </div>

        <h2>Rotate Your Phone</h2>

        <p>
            Use landscape mode for the best experience
        </p>

    </div>

</div>

<div class="start-screen" id="startScreen">

    <button
        class="start-button"
        id="startButton"
        type="button">

        Buka Hadiah

    </button>

</div>

<audio
    id="bgMusic"
    src="assets/music/kota.mpeg"
    preload="auto"
    loop
    playsinline>
</audio>

<main class="hero">

    <section class="hero__stage">

        <div class="hero__background"></div>

        <div class="hero__overlay"></div>

        <div class="pixel-rain">

            <i></i><i></i><i></i><i></i>
            <i></i><i></i><i></i><i></i>

        </div>

        <button
            class="character-card"
            type="button"
            data-open-gallery>

            <img
                src="assets/character.png"
                class="character character--default">

            <img
                src="assets/character_hover.png"
                class="character character--hover">

            <span class="character-card__hint">

                Klik karakter

            </span>

        </button>

        <div
            class="lyrics-panel"
            id="lyricsPanel">
        </div>

        <section
            id="polaroid-gallery"
            class="polaroid-layer"
            data-gallery>

            <button
                class="gallery-close"
                data-close-gallery>

                ×

            </button>

            <div
                class="polaroid-row"
                data-polaroid-row>
            </div>

            <article
                class="memory-detail"
                data-memory-detail>

                <div class="memory-detail__polaroid">

                    <div
                        class="memory-detail__photo"
                        data-detail-photo>
                    </div>

                </div>

                <div class="memory-detail__content">

                    <button
                        class="memory-detail__back"
                        data-back-gallery>

                        ← Kembali

                    </button>

                    <h2
                        class="memory-detail__date"
                        data-detail-date>
                    </h2>

                    <p
                        class="memory-detail__message"
                        data-detail-message>
                    </p>

                </div>

            </article>

        </section>

    </section>

</main>

<script src="script.js"></script>

</body>
</html>
